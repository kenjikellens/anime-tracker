<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4da6ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#0066cc" stop-opacity="1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle Outline -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#checkGradient)" stroke-width="6" opacity="0.6" stroke-linecap="round" stroke-dasharray="10 6" />
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#checkGradient)" stroke-width="2" opacity="0.3" />
  
  <!-- Thick Checkmark -->
  <path d="M 30 52 L 44 65 L 70 34" fill="none" stroke="url(#checkGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
