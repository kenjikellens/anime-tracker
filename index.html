<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker</title>
    
    <!-- Design & Fonts -->
    <link rel="stylesheet" href="css/styles.css?v=1.9.12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AniList card actions removed -->

</head>
<body>
    <!-- Top-level Navigation & Search -->
    <header class="header-main">
        <div class="header-content">
            <div class="header-left">
                <h1 class="logo-rascal"><span class="ras">RAS</span><span class="cal">CAL</span></h1>
            </div>
            <div class="header-center">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Zoek in je lijst...">
                </div>
            </div>
            <div class="header-right">
                <button id="sync-anilist-btn" title="AniList Sync"><i class="fa-brands fa-anilist"></i></button>
                <button id="download-btn" class="hidden" title="Download backup"><i class="fas fa-download"></i></button>
                <button id="theme-toggle" title="Switch theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <div id="app">
        <!-- Main Controls (Filters, Sorters, View Toggles) -->
        <div class="toolbar">
            <!-- Category Filters -->
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Alles</button>
                <button class="filter-btn" data-filter="2">Nieuw</button>
                <button class="filter-btn" data-filter="-1">Te Bekijken</button>
                <button class="filter-btn" data-filter="0">Bezig</button>
                <button class="filter-btn" data-filter="1">Bekeken</button>
            </div>

            <!-- Sorting Options -->
            <div class="sort-group">
                <select id="sort-select">
                    <option value="default">Sorteren: Standaard</option>
                    <option value="title-asc">Titel A→Z</option>
                    <option value="title-desc">Titel Z→A</option>
                    <option value="rating-desc">Beoordeling ↓</option>
                    <option value="rating-asc">Beoordeling ↑</option>
                    <option value="status">Status</option>
                </select>
            </div>


            <!-- Display Mode Toggle -->
            <div class="view-toggle">
                <button class="view-btn active" id="grid-btn" title="Grid view"><i class="fas fa-th"></i></button>
                <button class="view-btn" id="list-btn" title="List view"><i class="fas fa-list"></i></button>
            </div>

            <!-- Grid Sizing (Hidden in List View) -->
            <div class="size-toggle" id="size-toggle-container">
                <button class="size-btn" data-size="s">S</button>
                <button class="size-btn active" data-size="m">M</button>
                <button class="size-btn" data-size="l">L</button>
            </div>

            <span class="item-count" id="item-count">0 items</span>
        </div>

        <!-- Main Content Area: Grid or List Container -->
        <main>
            <div id="anime-container" class="grid-view">
                <!-- Dynamically filled by JavaScript -->
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Anime Tracker &bull; Mogelijk gemaakt door <span class="vidsrc-brand">VidSrc.to</span></p>
        </footer>
    </div>

    <!-- Modals Overlay System -->
    
    <!-- 1. Rating Modal: Used to score animes -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h3>Deze anime beoordelen?</h3>
            <p id="modal-title"></p>
            <div class="rating-input">
                <input type="number" id="rating-number" min="0" max="10" step="0.1" value="7.0">
                <span class="max-rating">/ 10</span>
            </div>
            <div class="modal-buttons">
                <button id="clear-rating" class="btn-secondary" onclick="document.getElementById('rating-number').value = '';" style="margin-right:auto; color:var(--text-muted); border-color:var(--border);">Wissen</button>
                <button id="cancel-rating" class="btn-secondary" onclick="document.getElementById('modal-overlay').classList.add('hidden');">Annuleren</button>
                <button id="save-rating" class="btn-primary" onclick="if(window.saveGlobalRating) window.saveGlobalRating();">Opslaan</button>
            </div>
        </div>
    </div>

    <!-- 2. Detail Modal: Shows franchise items with progress controls -->
    <div id="detail-overlay" class="hidden">
        <div class="modal modal-detail">
            <div class="modal-detail-header">
                <h3 id="detail-title"></h3>
                <button id="close-detail" class="btn-close">&times;</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- Logic & Domain Scripts -->
    <script type="module" src="js/app.js"></script>

    <!-- Global Dropdown Portal: Used for context menus to prevent overflow issues -->
    <div id="global-status-menu" class="status-menu shadow-lg"></div>
</body>
</html>
