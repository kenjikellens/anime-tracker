<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker | Premium List</title>
    
    <!-- Design & Fonts -->
    <link rel="stylesheet" href="styles.css?v=1.9.2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Inline styles for dynamic components -->
    <style>
        .anilist-status-tag { cursor: pointer; transition: transform 0.2s; }
        .anilist-status-tag:hover { transform: scale(1.2); filter: brightness(1.2); }
    </style>
</head>
<body>
    <!-- Top-level Navigation & Search -->
    <header class="header-main">
        <div class="header-content">
            <div class="header-left">
                <h1 class="logo-rascal"><span class="ras">RAS</span><span class="cal">CAL</span></h1>
            </div>
            <div class="header-center">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search in your list...">
                </div>
            </div>
            <div class="header-right">
                <button id="sync-anilist-btn" title="AniList Sync"><i class="fa-brands fa-anilist"></i></button>
                <button id="push-anilist-btn" title="Push All to AniList"><i class="fas fa-cloud-upload-alt"></i></button>
                <button id="download-btn" class="hidden" title="Download changed data.json"><i class="fas fa-download"></i></button>
                <button id="theme-toggle" title="Switch theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <div id="app">
        <!-- Main Controls (Filters, Sorters, View Toggles) -->
        <div class="toolbar">
            <div class="add-anime">
                <input type="text" id="new-anime-input" placeholder="Add series...">
                <button id="add-btn"><button id="add-btn"><i class="fas fa-plus"></i></button></button>
            </div>
            
            <!-- Category Filters -->
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="-1">To Watch</button>
                <button class="filter-btn" data-filter="0">Watching</button>
                <button class="filter-btn" data-filter="1">Watched</button>
            </div>

            <!-- Sorting Options -->
            <div class="sort-group">
                <select id="sort-select">
                    <option value="default">Sorting: Default</option>
                    <option value="title-asc">Title A→Z</option>
                    <option value="title-desc">Title Z→A</option>
                    <option value="rating-desc">Rating ↓</option>
                    <option value="rating-asc">Rating ↑</option>
                    <option value="status">Status</option>
                </select>
            </div>

            <!-- Embed Video Source Provider -->
            <div class="sort-group">
                <select id="source-select" title="Choose embed source">
                    <option value="vsembed">▶ VSEmbed</option>
                    <option value="embedsu">▶ Embed.su</option>
                    <option value="autoembed">▶ AutoEmbed</option>
                </select>
            </div>

            <!-- Display Mode Toggle -->
            <div class="view-toggle">
                <button class="view-btn active" id="grid-btn" title="Grid view"><i class="fas fa-th"></i></button>
                <button class="view-btn" id="list-btn" title="List view"><i class="fas fa-list"></i></button>
            </div>

            <!-- Grid Sizing (Hidden in List View) -->
            <div class="size-toggle" id="size-toggle-container">
                <button class="size-btn" data-size="s">S</button>
                <button class="size-btn active" data-size="m">M</button>
                <button class="size-btn" data-size="l">L</button>
            </div>

            <span class="item-count" id="item-count">0 items</span>
        </div>

        <!-- Main Content Area: Grid or List Container -->
        <main>
            <div id="anime-container" class="grid-view">
                <!-- Dynamically filled by JavaScript -->
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Anime Tracker &bull; Powered by <span class="vidsrc-brand">VidSrc.to</span></p>
        </footer>
    </div>

    <!-- Modals Overlay System -->
    
    <!-- 1. Rating Modal: Used to score animes -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h3>Rate this anime?</h3>
            <p id="modal-title"></p>
            <div class="rating-input">
                <input type="number" id="rating-number" min="0" max="10" step="0.1" value="7.0">
                <span class="max-rating">/ 10</span>
            </div>
            <div class="modal-buttons">
                <button id="clear-rating" class="btn-secondary" style="margin-right:auto; color:var(--text-muted); border-color:var(--border);">Clear</button>
                <button id="cancel-rating" class="btn-secondary">Cancel</button>
                <button id="save-rating" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- 2. Detail Modal: Shows seasons/episodes in grid view popups -->
    <div id="detail-overlay" class="hidden">
        <div class="modal modal-detail">
            <div class="modal-detail-header">
                <h3 id="detail-title"></h3>
                <button id="close-detail" class="btn-close">&times;</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- Logic & Domain Scripts -->
    <script src="domein/StatusCalculator.js"></script>
    <script src="domein/AnimeActions.js"></script>
    <script src="domein/State.js"></script>
    <script src="domein/Storage.js"></script>
    <!-- Legacy TMDB support commented out, using AniList as primary database -->
    <!-- <script src="domein/TmdbApi.js"></script> -->
    <script src="domein/AnilistApi.js"></script>
    <script src="domein/EmbedSources.js"></script>
    <script src="domein/ListTransformer.js"></script>
    <script src="domein/UIHelpers.js"></script>
    <script src="domein/BatchActions.js"></script>
    <script src="domein/Modals.js"></script>
    <script src="domein/Components.js"></script>
    <script src="app.js?v=1.2"></script>

    <!-- Global Dropdown Portal: Used for context menus to prevent overflow issues -->
    <div id="global-status-menu" class="status-menu shadow-lg"></div>
</body>
</html>
